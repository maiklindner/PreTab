<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title id="pageTitle">PreTab</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header>
      <div style="display: flex; justify-content: flex-end; width: 100%; margin-bottom: -1.5em; position: relative; z-index: 10;">
        <select id="langSelect" style="width: auto; padding: 6px; font-size: 0.85em; cursor: pointer; border: 1px solid var(--border-color); border-radius: 6px; background-color: var(--input-bg-color); color: var(--text-color);">
          <option value="auto">Auto (Browser)</option>
          <option value="en">English (en)</option>
          <option value="de">Deutsch (de)</option>
          <option value="es">Español (es)</option>
          <option value="fr">Français (fr)</option>
          <option value="ja">日本語 (ja)</option>
          <option value="pt_BR">Português (pt_BR)</option>
          <option value="zh_CN">中文 (zh_CN)</option>
        </select>
      </div>
      <h1 id="titleH1">PreTab</h1>
      <p id="optionsDesc">Configure background history and queue behavior.</p>
    </header>

    <main>

    <div class="setting-row">
      <div class="setting-info">
        <div class="setting-title" id="mruTitle">Last Active Tab (MRU)</div>
        <div class="setting-desc" id="mruDesc">Switch to your previously active tab when closing the current one.</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="mruToggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="setting-row">
      <div class="setting-info">
        <div class="setting-title" id="queueTitle">Background Queue</div>
        <div class="setting-desc" id="queueDesc">Treat recursively opened background tabs as a queue instead of normal MRU.</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="queueToggle" checked>
        <span class="slider"></span>
      </label>
    </div>
    </main>
  </div>
  <script src="options.js"></script>
</body>
</html>
